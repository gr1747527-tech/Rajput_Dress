<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Scroll Animation</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overscroll-behavior: none;
        }
        
        .black-section {
            height: 100vh;
            width: 100%;
            background-color: #000;
        }
        
        .animations-wrapper {
            height: 500vh;
            position: relative;
        }
        
        .canvas-wrapper {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Plain black section before the animation as requested -->
    <div class="black-section"></div>

    <div class="animations-wrapper" id="animations-wrapper">
        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d', { alpha: false });
        const wrapper = document.getElementById('animations-wrapper');
        
        const totalFrames = 240;
        
        const getFramePath = index => {
            const frameNum = (index + 1).toString().padStart(3, '0');
            return `ezgif-frame-${frameNum}.jpg`;
        };
        
        const images = new Array(totalFrames);
        let firstImageLoaded = false;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render(getCurrentFrameIndex());
        }
        
        function getCurrentFrameIndex() {
            const scrollTop = window.scrollY;
            const wrapperTop = wrapper.offsetTop;
            const wrapperHeight = wrapper.offsetHeight - window.innerHeight;
            
            if (scrollTop < wrapperTop) return 0;
            if (scrollTop >= wrapperTop + wrapperHeight) return totalFrames - 1;
            
            const scrollFraction = (scrollTop - wrapperTop) / wrapperHeight;
            const frameIndex = Math.floor(scrollFraction * totalFrames);
            return Math.min(totalFrames - 1, frameIndex);
        }
        
        function render(index) {
            const img = images[index];
            if (img && img.complete) {
                const hRatio = canvas.width / img.width;
                const vRatio = canvas.height / img.height;
                const ratio = Math.max(hRatio, vRatio);
                
                const drawWidth = img.width * ratio;
                const drawHeight = img.height * ratio;
                
                const centerX = (canvas.width - drawWidth) / 2;
                const centerY = (canvas.height - drawHeight) / 2;
                
                context.fillStyle = '#000';
                context.fillRect(0, 0, canvas.width, canvas.height);
                
                context.imageSmoothingEnabled = true;
                context.imageSmoothingQuality = 'high';
                
                context.drawImage(img, 0, 0, img.width, img.height,
                                   centerX, centerY, drawWidth, drawHeight);
            }
        }
        
        for (let i = 0; i < totalFrames; i++) {
            const img = new Image();
            img.src = getFramePath(i);
            img.onload = () => {
                images[i] = img;
                if (!firstImageLoaded && i === 0) {
                    firstImageLoaded = true;
                    resizeCanvas();
                }
            };
        }
        
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    render(getCurrentFrameIndex());
                    ticking = false;
                });
                ticking = true;
            }
        });
        
        window.addEventListener('resize', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    resizeCanvas();
                    ticking = false;
                });
                ticking = true;
            }
        });
        
        window.onload = () => {
            if (images[0] && images[0].complete && !firstImageLoaded) {
                firstImageLoaded = true;
                resizeCanvas();
            }
        };
    </script>
</body>
</html>
